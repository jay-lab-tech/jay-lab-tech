<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Text</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto Slab', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #2c3e50, #34495e);
            overflow: hidden;
            color: #fff;
            background-size: 400% 400%;
            animation: gradientBackground 15s ease infinite;
        }

        @keyframes gradientBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .text-container {
            text-align: center;
        }

        .text {
            font-size: 30px;
            font-weight: 700;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s ease-out, transform 1s ease-out;
            letter-spacing: 2px;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.4), 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .text.show {
            opacity: 1;
            transform: translateY(0);
        }

        .text:nth-child(odd) {
            color: #f39c12; /* Warna terang untuk teks ganjil */
        }

        .text:nth-child(even) {
            color: #2980b9; /* Warna cerah untuk teks genap */
        }

        .button {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 30px;
            background-color: #16a085;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(22, 160, 133, 0.7);
        }

        .button:hover {
            background-color: #1abc9c;
            box-shadow: 0 0 25px rgba(22, 160, 133, 1);
            transform: translateY(-5px);
        }

        .button:active {
            transform: translateY(2px);
        }
    </style>
</head>
<body>
    <div class="text-container">
        <div class="text" id="text1">Haiii Pinguinn🐧🐧🐧</div>
        <div class="text" id="text2">Ini aku ajay</div>
        <div class="text" id="text3">Karena kamu gamau nerima barang atau makanan</div>
        <div class="text" id="text4">Jadi aku kepikiran buat bikin ini</div>
        <div class="text" id="text5">Sebagai ucapan makasiii aku ke kamuuuu</div>
        <div class="text" id="text6">Karena kamu aku juga udah mulai kenal diri aku sendiri</div>
        <div class="text" id="text7">MAKASIIII BANYAKKKKK</div>
        <div class="text" id="text8">Aku ada sesuatu, coba tekan next di bawah iniii</div>
        <button class="button" onclick="showNextText()">Next</button>
    </div>

    <script>
        let currentTextIndex = 0;
        const texts = document.querySelectorAll('.text');
        const totalTexts = texts.length;

        function showNextText() {
            if (currentTextIndex < totalTexts) {
                texts[currentTextIndex].classList.add('show');
                currentTextIndex++;
            }
            if (currentTextIndex === totalTexts) {
                // All texts have been shown, redirect to the second file
                window.location.href = 'flower.html';
            }
        }
    </script>
</body>
</html>
